<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Knowledge Copilot Demo</title>
    <style>
      body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 840px; margin: 40px auto; padding: 0 20px; line-height: 1.6; }
      button { padding: 8px 14px; margin-right: 8px; cursor: pointer; }
      pre { background: #111827; color: #e5e7eb; padding: 16px; border-radius: 8px; min-height: 120px; white-space: pre-wrap; }
    </style>
  </head>
  <body>
    <h1>AI Knowledge Copilot</h1>
    <p>最小前端联调页：先启动后端 <code>uvicorn app.main:app --reload</code>，再用浏览器打开本文件。</p>
    <button id="health">检查 /health</button>
    <button id="hello">请求 /hello</button>
    <button id="stream">监听 /stream</button>
    <pre id="output">等待操作...</pre>
    <script>
      const API = 'http://127.0.0.1:8000';
      const output = document.querySelector('#output');
      const log = (value) => { output.textContent += '\n' + value; };
      document.querySelector('#health').onclick = async () => {
        output.textContent = JSON.stringify(await (await fetch(`${API}/health`)).json(), null, 2);
      };
      document.querySelector('#hello').onclick = async () => {
        output.textContent = JSON.stringify(await (await fetch(`${API}/hello?name=FE`)).json(), null, 2);
      };
      document.querySelector('#stream').onclick = () => {
        output.textContent = 'streaming...';
        const es = new EventSource(`${API}/stream`);
        es.onmessage = (event) => log(event.data);
        es.onerror = () => { log('stream closed'); es.close(); };
      };
    </script>
  </body>
</html>
